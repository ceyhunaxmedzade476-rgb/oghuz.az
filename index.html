<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azərbaycan Rayonları - Gəzməli Yerlər</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <h1>Azərbaycanı Kəşf Et</h1>
        <p>Rayonları seçin və onların gəzməli yerləri ilə tanış olun</p>
    </header>

    <div class="app-container">
        <!-- Rayon Seçimi Menyu (Kənar Panel) -->
        <aside class="sidebar">
            <h2>Rayonlar</h2>
            <ul id="district-list" class="district-list">
                <!-- JavaScript ilə doldurulacaq -->
            </ul>
        </aside>

        <!-- Əsas Məzmun -->
        <main class="content-area">
            <div id="welcome-message" class="welcome-message">
                <h2>Bölgələrimizin Gözəllikləri</h2>
                <p>Məlumat görmək və gəzməli yerləri kəşf etmək üçün sol menyudan bir rayon seçin.</p>
            </div>

            <!-- Seçilmiş rayonun detalları burada görünəcək -->
            <div id="district-details" class="district-details hidden">
                <div class="hero-image-container">
                    <img id="district-main-img" src="" alt="">
                    <div class="hero-overlay">
                        <h2 id="district-name">Rayon Adı</h2>
                    </div>
                </div>
                
                <div class="info-section">
                    <p id="district-desc" class="description">Məlumat</p>
                    
                    <h3 class="section-title">Gəzməli və Görməli Yerlər</h3>
                    <div id="places-grid" class="places-grid">
                        <!-- Kartlar JavaScript ilə bura əlavə ediləcək -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
