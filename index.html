<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azərbaycan Səyahət Rəhbəri</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 20px; width: 200px; cursor: pointer; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .place-card { border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff; transition: 0.3s; }
        .place-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .place-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background-color: #ddd; }
        .place-card h4 { margin: 10px 0 5px; color: #e67e22; }
        .place-card p { font-size: 14px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gəzməli Yerlər</h1>
    <p>Zəhmət olmasa, maraqlandığınız rayonu seçin:</p>
    
    <select id="rayonSelect" onchange="rayonuGoster()">
        <option value="">Rayon seçin...</option>
        <option value="oguz">Oğuz</option>
        <option value="gabala">Qəbələ</option>
        <option value="sheki">Şəki</option>
    </select>

    <div id="resultsContainer" class="results-grid">
        </div>
</div>

<script>
const yerlerData = {
    "oguz": [
        { ad: "Xal-Xal Şəlaləsi", sekil: "https://via.placeholder.com/300x200?text=Xal-Xal", qeyd: "Oğuzun mirvarisi, möhtəşəm təbiət." },
        { ad: "Oğuz Çayı", sekil: "https://via.placeholder.com/300x200?text=Oguz+Chay", qeyd: "Sərin dağ havası və təmiz su." }
    ],
    "gabala": [
        { ad: "Tufandağ", sekil: "https://via.placeholder.com/300x200?text=Tufandag", qeyd: "İstirahət və xizək mərkəzi." },
        { ad: "Nohur Gölü", sekil: "https://via.placeholder.com/300x200?text=Nohur+Golu", qeyd: "Mənzərəli istirahət zonası." }
    ],
    "sheki": [
        { ad: "Şəki Xan Sarayı", sekil: "https://via.placeholder.com/300x200?text=Xan+Sarayi", qeyd: "Tarixi və memarlıq abidəsi." },
        { ad: "Karvansaray", sekil: "https://via.placeholder.com/300x200?text=Karvansaray", qeyd: "Qədim ticarət və otel kompleksi." }
    ]
};

function rayonuGoster() {
    const select = document.getElementById('rayonSelect');
    const container = document.getElementById('resultsContainer');
    const secilenRayon = select.value;

    container.innerHTML = ""; 

    if (secilenRayon && yerlerData[secilenRayon]) {
        yerlerData[secilenRayon].forEach(yer => {
            container.innerHTML += `
                <div class="place-card">
                    <img src="${yer.sekil}" alt="${yer.ad}">
                    <h4>${yer.ad}</h4>
                    <p>${yer.qeyd}</p>
                </div>
            `;
        });
    } else if (secilenRayon) {
        container.innerHTML = "<p>Hələ ki, bu rayon haqqında məlumat yoxdur.</p>";
    }
}
</script>

</body>
</html>
