            <!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mənim Saytım</title>
    <style>
        body {
            /* Açıq rəngli fon */
            background-color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #334155;
            
            /* Ortada yerləşdirmək üçün */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        p {
            margin-bottom: 0;
            color: #475569;
            line-height: 1.6;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mənim Saytım</h1>
        <p>İstədiyiniz kimi açıq rəngli fona sahib, ortalanmış, çox sadə və təmiz kodla yazılmış veb-sayt.</p>
    </div>
</body>
</html>
